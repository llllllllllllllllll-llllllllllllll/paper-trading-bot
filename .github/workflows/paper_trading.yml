name: Paper Trading Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "28 * * * *"   # primary — 2 min before candle close
    - cron: "30 * * * *"   # primary — at candle close
    - cron: "32 * * * *"   # primary — 2 min after open
    - cron: "40 * * * *"   # backup 1 — if GitHub delayed primary
    - cron: "50 * * * *"   # backup 2 — if GitHub delayed further
    - cron: "55 * * * *"   # last resort — catchup runs missed candles

permissions:
  contents: write

concurrency:
  group: paper-trading-bot
  cancel-in-progress: false   # never kill a running bot mid-execution

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUNBUFFERED: "1"
      STATE_FILE: state.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper trading bot
        run: python paper_bot.py

      - name: Save state to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update state [skip ci]" || echo "No changes to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
