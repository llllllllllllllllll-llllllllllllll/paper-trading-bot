name: Keepalive

on:
  schedule:
    - cron: "0 0 * * *"   # runs once daily at midnight UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep workflow alive
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 20
